<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports803 Post Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080c18;--surface:#0f1626;--card:#131c30;--border:#1c2a42;--accent:#00d4ff;--green:#00ff88;--orange:#ff6b2b;--red:#ff3b5c;--text:#e8f0fe;--muted:#5a6f94;--dim:#3a4f6e;--tg:#29b6f6;--wa:#25d366;--fb:#1877f2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(0,212,255,.05) 0%,transparent 60%),radial-gradient(ellipse 50% 30% at 85% 90%,rgba(0,255,136,.03) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{max-width:1160px;margin:0 auto;padding:0 18px;position:relative;z-index:1}
header{padding:22px 0 18px;border-bottom:1px solid var(--border);margin-bottom:24px}
.hrow{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo b{-webkit-text-fill-color:var(--orange);color:var(--orange)}
.status{display:flex;align-items:center;gap:8px;font-size:.77rem;color:var(--muted);font-family:'JetBrains Mono',monospace}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,.5)}50%{opacity:.7;box-shadow:0 0 0 5px rgba(0,255,136,0)}}
#cd{color:var(--accent);font-weight:600}
.rbtn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.72rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .15s}
.rbtn:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:flex;gap:5px;margin-bottom:20px;background:var(--surface);padding:5px;border-radius:12px;border:1px solid var(--border);width:fit-content}
.tab{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.83rem;font-weight:700;background:transparent;color:var(--muted);transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active-tg{background:var(--tg);color:#000}
.tab.active-wa{background:var(--wa);color:#000}
.tab.active-fb{background:var(--fb);color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.ph{padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--border);font-size:.72rem;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;justify-content:space-between}
.badge{background:var(--accent);color:#000;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'JetBrains Mono',monospace}
.fbar{padding:10px 12px 6px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ftag{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.ftag:hover{border-color:var(--accent);color:var(--accent)}
.ftag.on{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.08)}
.sbar{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.smbtn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.72rem;font-weight:600;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.smbtn:hover{border-color:var(--accent);color:var(--accent)}
.plist{max-height:430px;overflow-y:auto;padding:8px}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.pitem{display:flex;align-items:flex-start;gap:9px;padding:9px 10px;border-radius:9px;margin-bottom:4px;border:1px solid transparent;cursor:pointer;transition:all .12s;background:var(--surface)}
.pitem:hover{border-color:var(--border);background:#17213a}
.pitem.sel{border-color:var(--accent)!important;background:rgba(0,212,255,.06)!important}
.pitem input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;flex-shrink:0;margin-top:2px;cursor:pointer}
.pmeta{flex:1;min-width:0}
.ptitle{font-size:.83rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pinfo{display:flex;align-items:center;gap:5px;margin-top:2px}
.plabel{padding:1px 7px;border-radius:20px;font-size:.64rem;font-weight:700}
.loading{padding:20px;text-align:center;color:var(--muted);font-size:.8rem}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:var(--red);font-size:.78rem;padding:16px;text-align:center;line-height:1.6}
.opts{padding:0 14px 12px}
.ol{font-size:.7rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;margin-top:12px}
.orow{display:flex;gap:6px;flex-wrap:wrap}
.obtn{padding:6px 13px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:.78rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .12s}
.obtn:hover{border-color:var(--accent);color:var(--accent)}
.obtn.on-tg{border-color:var(--tg)!important;color:var(--tg)!important;background:rgba(41,182,246,.08)!important}
.obtn.on-wa{border-color:var(--wa)!important;color:var(--wa)!important;background:rgba(37,211,102,.08)!important}
.obtn.on-fb{border-color:var(--fb)!important;color:var(--fb)!important;background:rgba(24,119,242,.08)!important}
.tinput{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:.82rem;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.tinput:focus{border-color:var(--accent)}
.tinput::placeholder{color:var(--dim)}
.outbox{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:13px;color:var(--text);font-size:.8rem;font-family:'JetBrains Mono',monospace;line-height:1.75;resize:vertical;min-height:260px;outline:none}
.outbox:focus{border-color:var(--accent)}
.ccount{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--muted);margin-top:4px;text-align:right}
.arow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.genbtn{flex:1;padding:11px 16px;border-radius:9px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.genbtn.gen{background:linear-gradient(135deg,var(--accent),#0099cc);color:#000}
.genbtn.gen:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,212,255,.3)}
.genbtn.cop{background:var(--surface);border:1px solid var(--border);color:var(--text);flex:0 0 auto}
.genbtn.cop:hover{border-color:var(--green);color:var(--green)}
.genbtn.cop.copied{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.08)}
.tc{display:none}.tc.active{display:block}
.rcol{display:flex;flex-direction:column;gap:14px}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="hrow">
    <div class="logo">Sports<b>803</b> Post Generator</div>
    <div class="status">
      <div class="dot"></div>
      <span id="pc">Loading…</span>&nbsp;·&nbsp;Refresh in <span id="cd">5:00</span>
      <button class="rbtn" onclick="fetchPosts()">↻ Now</button>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active-tg" onclick="switchTab('tg',this)">✈️ Telegram</button>
  <button class="tab" onclick="switchTab('wa',this)">💬 WhatsApp</button>
  <button class="tab" onclick="switchTab('fb',this)">📘 Facebook</button>
</div>

<div class="grid">
  <div>
    <div class="panel">
      <div class="ph">Select Posts <span class="badge" id="sc">0 selected</span></div>
      <div class="fbar" id="fbar"><button class="ftag on" data-lbl="all" onclick="filterLabel(this)">All</button></div>
      <div class="sbar">
        <button class="smbtn" onclick="selectAll()">✅ All</button>
        <button class="smbtn" onclick="clearAll()">✕ Clear</button>
        <button class="smbtn" onclick="selectVisible()">☑ Visible</button>
      </div>
      <div class="plist" id="plist"><div class="loading"><span class="spin"></span>Fetching latest posts…</div></div>
    </div>
  </div>

  <div class="rcol">
    <div id="tc-tg" class="tc active">
      <div class="panel">
        <div class="ph">Telegram Options</div>
        <div class="opts">
          <div class="ol">Header</div>
          <div class="orow">
            <button class="obtn on-tg" data-k="tg-hdr" data-v="none" onclick="setOpt(this)">No header</button>
            <button class="obtn" data-k="tg-hdr" data-v="sports" onclick="setOpt(this)">🏆 Sports Day</button>
            <button class="obtn" data-k="tg-hdr" data-v="live" onclick="setOpt(this)">🔴 LIVE NOW</button>
          </div>
          <div class="ol">Footer line</div>
          <input class="tinput" id="tg-footer" value="📋 Tap the link to copy🌐 Open in Chrome to watch">
        </div>
      </div>
    </div>

    <div id="tc-wa" class="tc">
      <div class="panel">
        <div class="ph">WhatsApp Options</div>
        <div class="opts">
          <div class="ol">Competition title</div>
          <input class="tinput" id="wa-title" value="TODAY'S LIVE MATCHES">
          <div class="ol">Intro message</div>
          <input class="tinput" id="wa-intro" value="Watch today's matches live for free on Sports803 Live Streams.">
          <div class="ol">VPN tip</div>
          <div class="orow">
            <button class="obtn on-wa" data-k="wa-vpn" data-v="yes" onclick="setOpt(this)">Include</button>
            <button class="obtn" data-k="wa-vpn" data-v="no" onclick="setOpt(this)">Skip</button>
          </div>
        </div>
      </div>
    </div>

    <div id="tc-fb" class="tc">
      <div class="panel">
        <div class="ph">Facebook Options</div>
        <div class="opts">
          <div class="ol">Format</div>
          <div class="orow">
            <button class="obtn on-fb" data-k="fb-fmt" data-v="watch" onclick="setOpt(this)">Watch … free live stream</button>
            <button class="obtn" data-k="fb-fmt" data-v="live" onclick="setOpt(this)">🔴 LIVE: …</button>
            <button class="obtn" data-k="fb-fmt" data-v="short" onclick="setOpt(this)">Link only</button>
          </div>
          <div class="ol">Separator</div>
          <div class="orow">
            <button class="obtn on-fb" data-k="fb-sep" data-v="line" onclick="setOpt(this)">Line break</button>
            <button class="obtn" data-k="fb-sep" data-v="dots" onclick="setOpt(this)">… dots</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">Generated Post</div>
      <div style="padding:13px">
        <textarea class="outbox" id="out" readonly placeholder="Select posts then click Generate ↓"></textarea>
        <div class="ccount" id="cc">0 characters</div>
        <div class="arow">
          <button class="genbtn gen" onclick="generate()">⚡ Generate Post</button>
          <button class="genbtn cop" id="cpbtn" onclick="copyOut()">📋 Copy</button>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
let posts=[],selected=new Set(),activeLabel='all',curTab='tg';
let O={'tg-hdr':'none','wa-vpn':'yes','fb-fmt':'watch','fb-sep':'line'};
let cdVal=300,cdTimer,jsonpTimer=null;

const LM={
  'premier league':{e:'⚽',c:'#3d85c8',b:'rgba(61,133,200,.15)'},
  'champions league':{e:'⚽',c:'#ffd700',b:'rgba(255,215,0,.12)'},
  'la liga':{e:'⚽',c:'#c60b1e',b:'rgba(198,11,30,.12)'},
  'serie a':{e:'⚽',c:'#0055a4',b:'rgba(0,85,164,.15)'},
  'bundesliga':{e:'⚽',c:'#e32219',b:'rgba(227,34,25,.12)'},
  'french league':{e:'⚽',c:'#002395',b:'rgba(0,35,149,.15)'},
  'ligue 1':{e:'⚽',c:'#002395',b:'rgba(0,35,149,.15)'},
  'championship':{e:'⚽',c:'#8b5e3c',b:'rgba(139,94,60,.15)'},
  'nba':{e:'🏀',c:'#ff6b2b',b:'rgba(255,107,43,.12)'},
  'f1':{e:'🏎',c:'#e10600',b:'rgba(225,6,0,.12)'},
  'ufc':{e:'🥊',c:'#d4af37',b:'rgba(212,175,55,.12)'},
  'wwe':{e:'🤼',c:'#ff6b2b',b:'rgba(255,107,43,.12)'},
  'tennis':{e:'🎾',c:'#adff2f',b:'rgba(173,255,47,.1)'},
  'motogp':{e:'🏍',c:'#ff4500',b:'rgba(255,69,0,.12)'},
  'wrc':{e:'🚗',c:'#00bcd4',b:'rgba(0,188,212,.12)'},
  'highlights':{e:'🎬',c:'#9c27b0',b:'rgba(156,39,176,.12)'},
  'default':{e:'⚽',c:'#00d4ff',b:'rgba(0,212,255,.1)'}
};

function lm(raw){
  const k=(raw||'').toLowerCase().trim();
  for(const[key,v] of Object.entries(LM)){if(k.includes(key))return{...v,name:raw}}
  return{...LM.default,name:raw}
}

// ── JSONP: the only reliable way to hit Blogger from a static page ──────────
function fetchPosts(){
  // Cancel any pending JSONP timeout
  if(jsonpTimer){clearTimeout(jsonpTimer);jsonpTimer=null;}

  // Remove any leftover JSONP script tags
  document.querySelectorAll('script[data-jsonp]').forEach(s=>s.remove());

  setList('<div class="loading"><span class="spin"></span>Fetching latest posts…</div>');
  document.getElementById('pc').textContent='Loading…';
  posts=[];

  // Expose callback globally before injecting the script
  window.__bloggerCB=function(data){
    if(jsonpTimer){clearTimeout(jsonpTimer);jsonpTimer=null;}
    document.querySelectorAll('script[data-jsonp]').forEach(s=>s.remove());
    parseFeed(data);
  };

  // Blogger supports ?callback= natively — no CORS proxy needed
  const url='https://sports803livestream.blogspot.com/feeds/posts/default'
    +'?alt=json&max-results=50&callback=__bloggerCB';

  const s=document.createElement('script');
  s.src=url;
  s.dataset.jsonp='1';
  s.onerror=function(){
    if(jsonpTimer){clearTimeout(jsonpTimer);jsonpTimer=null;}
    onFetchError('Script load error – check network / ad-blocker.');
  };
  document.head.appendChild(s);

  // 12-second timeout
  jsonpTimer=setTimeout(()=>{
    document.querySelectorAll('script[data-jsonp]').forEach(s=>s.remove());
    onFetchError('Timed out after 12 s. Try clicking ↻ Now again.');
  },12000);
}

function parseFeed(data){
  const entries=(data&&data.feed&&data.feed.entry)||[];
  if(!entries.length){
    onFetchError('Feed returned 0 entries. The blog may be empty or private.');
    return;
  }
  posts=entries.map(e=>{
    const title=clean(e.title.$t);
    const linkArr=e.link||[];
    const alt=linkArr.find(l=>l.rel==='alternate');
    const url=(alt||linkArr[linkArr.length-1]||{}).href||'';
    const cats=(e.category||[]).map(c=>c.term);
    const label=cats[0]||'sport';
    return{title,url,label};
  });
  buildLabels();renderList();
  document.getElementById('pc').textContent=posts.length+' posts loaded';
  resetCd();
}

function onFetchError(msg){
  setList(`<div class="err">⚠️ ${msg}<br><br>Click <b>↻ Now</b> to retry.</div>`);
  document.getElementById('pc').textContent='Error – retry';
}

function clean(s){
  return s.replace(/\s*[|–—]\s*(free live stream|watch online|sports 803|live stream \d+).*/i,'')
    .replace(/^(watch\s+|live:\s+|free\s+)/i,'')
    .replace(/\s+x\s+/gi,' vs ').replace(/\s+/g,' ').trim();
}

function buildLabels(){
  const fb=document.getElementById('fbar');
  fb.querySelectorAll('.ftag:not([data-lbl="all"])').forEach(b=>b.remove());
  [...new Set(posts.map(p=>p.label))].filter(Boolean).sort().forEach(lbl=>{
    const m=lm(lbl),b=document.createElement('button');
    b.className='ftag';b.dataset.lbl=lbl;
    b.onclick=function(){filterLabel(this)};
    b.textContent=m.e+' '+lbl;
    fb.appendChild(b);
  });
}

function filterLabel(btn){
  activeLabel=btn.dataset.lbl;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.toggle('on',b===btn));
  renderList();
}

function vis(){return posts.filter(p=>activeLabel==='all'||p.label.toLowerCase()===activeLabel.toLowerCase())}

function renderList(){
  const vp=vis();
  if(!vp.length){setList('<div class="loading">No posts for this label.</div>');return}
  setList(vp.map(p=>{
    const i=posts.indexOf(p),m=lm(p.label),s=selected.has(i);
    return`<div class="pitem${s?' sel':''}" onclick="toggle(${i},event)">
      <input type="checkbox"${s?' checked':''} onclick="toggle(${i},event)">
      <div class="pmeta">
        <div class="ptitle">${p.title}</div>
        <div class="pinfo"><span class="plabel" style="background:${m.b};color:${m.c}">${m.e} ${p.label}</span></div>
      </div></div>`;
  }).join(''));
  document.getElementById('sc').textContent=selected.size+' selected';
}

function setList(h){document.getElementById('plist').innerHTML=h}
function toggle(i,e){e.stopPropagation();selected.has(i)?selected.delete(i):selected.add(i);renderList()}
function selectAll(){posts.forEach((_,i)=>selected.add(i));renderList()}
function clearAll(){selected.clear();renderList()}
function selectVisible(){vis().forEach(p=>selected.add(posts.indexOf(p)));renderList()}

function setOpt(btn){
  const k=btn.dataset.k,v=btn.dataset.v;O[k]=v;
  const cls='on-'+curTab;
  btn.closest('.orow').querySelectorAll('.obtn').forEach(b=>b.classList.remove('on-tg','on-wa','on-fb'));
  btn.classList.add(cls);
}

function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.tc').forEach(el=>el.classList.remove('active'));
  document.getElementById('tc-'+tab).classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active-tg','active-wa','active-fb'));
  btn.classList.add('active-'+tab);
  document.getElementById('out').value='';
  document.getElementById('cc').textContent='0 characters';
}

function generate(){
  const items=[...selected].sort((a,b)=>a-b).map(i=>posts[i]);
  if(!items.length){alert('Please select at least one post!');return}
  let out='';
  if(curTab==='tg'){
    const hdr=O['tg-hdr'];
    if(hdr==='sports')out+='🏆 SPORTS DAY – LIVE MATCHES 🏆\n\n';
    else if(hdr==='live')out+='🔴 LIVE NOW – TODAY\'S MATCHES 🔴\n\n';
    items.forEach(p=>{out+=`${lm(p.label).e} ${p.title}\n${p.url}\n`});
    const ft=document.getElementById('tg-footer').value.trim();
    if(ft)out+='\n'+ft;
  }else if(curTab==='wa'){
    const title=document.getElementById('wa-title').value.trim()||'TODAY\'S LIVE MATCHES';
    const intro=document.getElementById('wa-intro').value.trim();
    const vpn=O['wa-vpn']==='yes';
    const em=lm(items[0]?.label).e;
    out+=`${em}🔥 ${title} – LIVE MATCHES TODAY 🔥${em}\n`;
    if(intro)out+=intro+'\n';
    if(vpn)out+='If the video does not play in your country, simply use a VPN and refresh the page.\n';
    out+='\n⸻\n\n🏆 Featured Matches\n';
    items.forEach(p=>{out+=`${lm(p.label).e} ${p.title}\n👉 ${p.url}\n`});
  }else{
    const fmt=O['fb-fmt'],sep=O['fb-sep'];
    out=items.map(p=>{
      if(fmt==='watch')return`Watch ${p.title} free live stream ${p.url}`;
      if(fmt==='live')return`🔴 LIVE: ${p.title}\n${p.url}`;
      return`${p.title} ${p.url}`;
    }).join(sep==='dots'?'\n…\n':'\n');
  }
  document.getElementById('out').value=out;
  document.getElementById('cc').textContent=out.length+' characters';
}

function copyOut(){
  const v=document.getElementById('out').value;if(!v)return;
  navigator.clipboard.writeText(v).then(()=>{
    const b=document.getElementById('cpbtn');
    b.textContent='✅ Copied!';b.classList.add('copied');
    setTimeout(()=>{b.textContent='📋 Copy';b.classList.remove('copied')},2000);
  });
}

function resetCd(){
  cdVal=300;clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    cdVal--;
    const m=Math.floor(cdVal/60),s=String(cdVal%60).padStart(2,'0');
    document.getElementById('cd').textContent=`${m}:${s}`;
    if(cdVal<=0)fetchPosts();
  },1000);
}

fetchPosts();
</script>
</body>
</html>
